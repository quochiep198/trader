name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf_sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push backend subdirectory to Hugging Face Space
        run: |
          # 1. Thiet lap Git Credentials
          git config --global user.email "deploy-bot@trademind.ai"
          git config --global user.name "Deploy Bot"
          
          # 2. Add remote Hugging Face Space
          git remote add hf https://quochiepho:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/quochiepho/traider
          
          # 3. Tach thu muc 'backend' ra thanh mot nhanh tam thoi va force push len Space
          git subtree split --prefix=backend -b temp-hf-branch
          git push hf temp-hf-branch:main --force
