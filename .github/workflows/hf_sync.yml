name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/hf_sync.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c '
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "quochiep198/trader"
          try:
              print(f"Ensuring Hugging Face Space '{repo_id}' exists...")
              api.create_repo(
                  repo_id=repo_id,
                  repo_type="space",
                  space_sdk="docker",
                  exist_ok=True
              )
          except Exception as e:
              print(f"Warning: Could not check/create repository (proceeding anyway): {e}")
              
          print("Uploading backend folder to Hugging Face Space...")
          api.upload_folder(
              folder_path="./backend",
              repo_id=repo_id,
              repo_type="space",
              path_in_repo="."
          )
          print("Upload completed successfully!")
          '
